<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Perfil - Core of gambiarra</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #26394d;
      }

      /* Topbar */
      .topbar {
        background: #191b47;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #ccc;
      }

      /* Layout */
      .container {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }

      .content {
        width: 600px;
        background: white;
        padding: 15px;
        border-radius: 5px;
      }

      .perfil-nome {
        font-size: 24px;
        font-weight: bold;
      }

      .perfil-descricao {
        margin-top: 10px;
        font-size: 18px;
      }

      button {
        margin-top: 10px;
        padding: 8px;
        background: #1e3869;
        border-radius: 10px;
        color: white;
        cursor: pointer;
      }

      .topbar button {
        padding: 10px 30px;
        width: auto;
        font-size: 14px;
      }

      .logo {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        font-weight: bold;
        color: #00eaff;
        text-shadow: 0 0 10px #00eaff;
        text-align: center;
        letter-spacing: 2px;
        font-family: Arial, Helvetica, sans-serif;
        background: radial-gradient(
          circle,
          #0a0925 20%,
          #1c1a46 50%,
          #3a38a0 100%
        );
        padding: 15px;
        border-radius: 50%;
        width: 200px;
        height: 50px;
        border-color: black;
        border-width: 5px;
        border-style: solid;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="logo">
        CORE
        <span>OF</span>
        GAMBIARRA
      </div>
      <input type="text" placeholder="Buscar..." />
      <button>Logoff</button>
    </div>

    <div class="container">
      <div class="content" id="content">
        <!-- Conteúdo do perfil vai aqui -->
      </div>
    </div>

    <script>
      const perfis = [
        {
          nome: "caveira games",
          descricao:
            "Especialista em assistencia tecnica e um grande fã de karrot",
        },
        {
          nome: "Gameskauuu",
          descricao:
            "além de garoto de programa e gamer próficional (top 10 do bairro). é um dos maiores usuarios de gambiarra do brasil",
        },
        {
          nome: "Ronaldo",
          descricao:
            "Por favor parem de me mandar o meme Ronaldo toda vez na minha dm >:(",
        },
      ];

      const urlParams = new URLSearchParams(window.location.search);
      const perfilNome = urlParams.get("nome");

      if (perfilNome) {
        const perfil = perfis.find(
          (p) => p.nome === decodeURIComponent(perfilNome),
        );
        if (perfil) {
          document.getElementById("content").innerHTML = `
            <div class="perfil-nome">${perfil.nome}</div>
            <div class="perfil-descricao">${perfil.descricao}</div>
            <button onclick="window.history.back()">Voltar</button>
          `;
        } else {
          document.getElementById("content").innerHTML =
            '<p>Perfil não encontrado.</p><button onclick="window.history.back()">Voltar</button>';
        }
      } else {
        document.getElementById("content").innerHTML =
          '<p>Perfil não especificado.</p><button onclick="window.history.back()">Voltar</button>';
      }
    </script>
  </body>
</html>
