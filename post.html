<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Post - Core of gambiarra</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #26394d;
      }

      /* Topbar */
      .topbar {
        background: #191b47;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #ccc;
      }

      /* Layout */
      .container {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }

      .content {
        width: 600px;
        background: white;
        padding: 15px;
        border-radius: 5px;
      }

      .post-title {
        font-size: 24px;
        font-weight: bold;
      }

      .post-content {
        margin-top: 10px;
        font-size: 18px;
      }

      button {
        margin-top: 10px;
        padding: 8px;
        background: #1e3869;
        border-radius: 10px;
        color: white;
        cursor: pointer;
      }

      .topbar button {
        padding: 10px 30px;
        width: auto;
        font-size: 14px;
      }

      .logo {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        font-weight: bold;
        color: #00eaff;
        text-shadow: 0 0 10px #00eaff;
        text-align: center;
        letter-spacing: 2px;
        font-family: Arial, Helvetica, sans-serif;
        background: radial-gradient(
          circle,
          #0a0925 20%,
          #1c1a46 50%,
          #3a38a0 100%
        );
        padding: 15px;
        border-radius: 50%;
        width: 200px;
        height: 50px;
        border-color: black;
        border-width: 5px;
        border-style: solid;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="logo">
        CORE
        <span>OF</span>
        GAMBIARRA
      </div>
      <input type="text" placeholder="Buscar..." />
      <button>Logoff</button>
    </div>

    <div class="container">
      <div class="content" id="content">
        <!-- Conteúdo do post vai aqui -->
      </div>
    </div>

    <script>
      let db;
      const posts = [
        {
          titulo: "Aprendi JavaScript hoje!",
          conteudo: "Hoje estudei funções e arrays.",
        },
        {
          titulo: "Dica de redes",
          conteudo: "Subnetting é importante!",
        },
      ];

      // Inicializa IndexedDB
      function initDB() {
        const request = indexedDB.open('CoreOfGambiarraDB', 1);
        request.onupgradeneeded = function(event) {
          db = event.target.result;
          if (!db.objectStoreNames.contains('posts')) {
            db.createObjectStore('posts', { keyPath: 'id', autoIncrement: true });
          }
        };
        request.onsuccess = function(event) {
          db = event.target.result;
          loadPost();
        };
        request.onerror = function(event) {
          console.error('Erro ao abrir DB:', event.target.error);
        };
      }

      // Carrega post específico
      function loadPost() {
        const urlParams = new URLSearchParams(window.location.search);
        const postId = parseInt(urlParams.get('id'));

        if (postId !== null) {
          const transaction = db.transaction(['posts'], 'readonly');
          const store = transaction.objectStore('posts');
          const request = store.get(postId);
          request.onsuccess = function() {
            const post = request.result;
            if (post) {
              document.getElementById('content').innerHTML = `
                <div class="post-title">${post.titulo}</div>
                <div class="post-content">${post.conteudo}</div>
                <button onclick="window.history.back()">Voltar</button>
              `;
            } else {
              // Fallback para posts hardcoded se não encontrar no DB
              const fallbackPost = posts[postId];
              if (fallbackPost) {
                document.getElementById('content').innerHTML = `
                  <div class="post-title">${fallbackPost.titulo}</div>
                  <div class="post-content">${fallbackPost.conteudo}</div>
                  <button onclick="window.history.back()">Voltar</button>
                `;
              } else {
                document.getElementById('content').innerHTML = '<p>Post não encontrado.</p><button onclick="window.history.back()">Voltar</button>';
              }
            }
          };
        } else {
          document.getElementById('content').innerHTML = '<p>Post não especificado.</p><button onclick="window.history.back()">Voltar</button>';
        }
      }

      // Inicializa DB
      initDB();
    </script>
  </body>
</html>
